---
# Kubernaut Test Playbook: Validate Secret Dependency Injection
# Issue #312: E2E test for dependencies.secrets via AWX credential env vars
#
# This playbook validates that the Kubernaut WFE controller correctly injects
# K8s Secret data as environment variables via ephemeral AWX credentials.
#
# Expected env var (from Secret "e2e-dep-secret-ansible" with key "token"):
#   KUBERNAUT_SECRET_E2E_DEP_SECRET_ANSIBLE_TOKEN

- name: Validate Secret Dependency Injection
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Read injected secret from AWX credential env var
      ansible.builtin.set_fact:
        injected_token: "{{ lookup('env', 'KUBERNAUT_SECRET_E2E_DEP_SECRET_ANSIBLE_TOKEN') }}"
      no_log: true

    - name: Validate secret was injected
      ansible.builtin.assert:
        that:
          - injected_token is defined
          - injected_token | length > 0
        fail_msg: "KUBERNAUT_SECRET_E2E_DEP_SECRET_ANSIBLE_TOKEN env var not injected or empty"
        success_msg: "Secret dependency injection validated successfully"

    - name: Report success
      ansible.builtin.debug:
        msg: "E2E-WE-015-005: Secret dependency injection via AWX credential verified"
